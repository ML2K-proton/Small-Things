<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Survival Balanced Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117; --panel-color: #161b22; --text-color: #c9d1d9;
            --primary-color: #ff79c6; --secondary-color: #8be9fd; --success-color: #50fa7b;
            --warning-color: #ffb86c; --danger-color: #ff5555;
        }
        body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; font-size: 13px; }
        .container { max-width: 900px; width: 100%; }
        h1, h2, h3 { text-align: center; color: var(--primary-color); margin: 5px 0; }
        h2 { font-size: 1.2rem; border-bottom: 1px dashed #30363d; padding-bottom: 5px; }
        .status-panel { background-color: var(--panel-color); border: 1px solid var(--primary-color); border-radius: 8px; padding: 10px; text-align: center; margin-bottom: 10px; position: relative; }
        .sp-display { font-size: 2.5rem; font-weight: bold; color: var(--secondary-color); text-shadow: 0 0 10px rgba(139, 233, 253, 0.4); margin: 2px 0; }
        .btn-tax { position: absolute; top: 10px; right: 10px; background-color: rgba(255, 85, 85, 0.1); border: 1px solid var(--danger-color); color: var(--danger-color); padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-tax:hover { background-color: var(--danger-color); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background-color: var(--panel-color); border: 1px solid #30363d; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .item-list { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        
        .item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background-color: rgba(255, 255, 255, 0.02); border-radius: 4px; border-left: 3px solid #fff; }
        .item.quest { border-left-color: var(--success-color); }
        .item.shop { border-left-color: var(--warning-color); }
        .item.active-voucher { border-left-color: var(--primary-color); background-color: rgba(255, 121, 198, 0.04); }
        .item-info { display: flex; flex-direction: column; flex-grow: 1; min-width: 0; padding-right: 8px; }
        .item-title-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .item-title { font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-desc { font-size: 11px; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
        .item-cost { font-weight: bold; white-space: nowrap; padding: 0 8px; }
        .cost-plus { color: var(--success-color); }
        .cost-minus { color: var(--warning-color); }

        button.action-btn { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; min-width: 65px; font-size: 12px; }
        .quest-btn { background-color: rgba(80, 250, 123, 0.1); color: var(--success-color); border: 1px solid var(--success-color); }
        .quest-btn:hover { background-color: var(--success-color); color: var(--bg-color); }
        .shop-btn { background-color: rgba(255, 184, 108, 0.1); color: var(--warning-color); border: 1px solid var(--warning-color); }
        .shop-btn:hover { background-color: var(--warning-color); color: var(--bg-color); }
        .ctrl-btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 4px; font-size: 11px; }
        .play-btn { background-color: var(--success-color); color: var(--bg-color); }
        .pause-btn { background-color: var(--warning-color); color: var(--bg-color); }
        .btn-delete { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 11px; padding: 0 4px; }
        .btn-delete:hover { color: var(--danger-color); }
        .add-custom-box { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #30363d; }
        .add-row { display: flex; gap: 5px; }
        .add-custom-box input, .add-custom-box select { background-color: var(--bg-color); border: 1px solid #30363d; color: var(--text-color); padding: 5px; border-radius: 4px; font-size: 12px; }
        .add-custom-box input[type="text"] { flex-grow: 1; }
        .add-custom-box input[type="number"] { width: 60px; }
        .log-panel { background-color: var(--panel-color); border: 1px solid #30363d; border-radius: 8px; padding: 10px; max-height: 100px; overflow-y: auto; }
        .log-entry { font-family: monospace; font-size: 11px; margin-bottom: 3px; border-bottom: 1px dashed rgba(255,255,255,0.03); padding-bottom: 2px; }
        .timer-display { font-family: monospace; font-size: 12px; font-weight: bold; color: var(--secondary-color); white-space: nowrap; margin-right: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>OMNI-SURVIVAL <span style="font-size: 0.8rem; color: var(--secondary-color);">v5.0 Balanced</span></h1>

    <div class="status-panel">
        <button class="btn-tax" onclick="applyTax()">⚠️ Thuế Ngày (-10 SP)</button>
        <div class="sp-display" id="sp-counter">20</div>
        <div style="font-size: 11px; color: var(--primary-color); letter-spacing: 1px;">SURVIVAL POINTS (SP)</div>
    </div>

    <div class="card" style="margin-bottom: 10px; border-color: var(--primary-color);">
        <h2 style="margin: 2px 0 6px 0;">🎒 INVENTORY</h2>
        <div class="item-list" id="inventory-container"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>⚒️ FARMING QUESTS</h2>
            <div class="item-list" id="quests-container"></div>
            <div class="add-custom-box">
                <div class="add-row">
                    <input type="text" id="new-quest-title" placeholder="Tên việc...">
                    <input type="number" id="new-quest-sp" placeholder="+SP" min="1">
                    <button class="action-btn quest-btn" onclick="addNewQuest()">+ Add</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🛒 SP SHOP</h2>
            <div class="item-list" id="shop-container"></div>
            <div class="add-custom-box">
                <div class="add-row">
                    <input type="text" id="new-shop-title" placeholder="Tên vật phẩm..." style="flex-grow: 2;">
                    <input type="number" id="new-shop-cost" placeholder="-SP" min="1">
                </div>
                <div class="add-row">
                    <select id="new-shop-type" onchange="toggleDurationInput()">
                        <option value="instant">Dùng Ngay</option>
                        <option value="duration">Chạy Timer</option>
                    </select>
                    <input type="number" id="new-shop-hours" placeholder="Số giờ" min="1" style="display:none; width: 55px;">
                    <button class="action-btn shop-btn" onclick="addNewShopItem()">+ Tạo</button>
                </div>
            </div>
        </div>
    </div>

    <div class="log-panel">
        <div id="log-container"></div>
    </div>
</div>

<script>
    // BỘ THÔNG SỐ ĐÃ ĐƯỢC CHỈNH SỬA CÂN BẰNG KINH TẾ (BALANCE)
    const initialShopItems = [
        { title: 'Voucher Điều Hòa (1h)', desc: 'Chạy Timer', cost: 5, duration: 3600 },
        { title: 'Nâng Cấp Thực Phẩm', desc: 'Thịt ngon, sữa chua...', cost: 10, duration: 0 },
        { title: 'Voucher Shopee', desc: 'Chốt đơn nhỏ', cost: 25, duration: 0 },
        { title: 'Vé Xem Phim giải trí', desc: 'Mở khóa phim rạp/stream', cost: 40, duration: 7200 }
    ];
    const initialQuests = [
        { title: 'Code Focus (1 tiếng)', desc: 'Flutter / Kiến trúc RWA / Bug fix', sp: 10 },
        { title: 'Luyện Tiếng Anh (30p)', desc: 'Phát âm / Shadowing', sp: 5 },
        { title: 'Thể Chất & Sức Khỏe', desc: 'Tập gym chuẩn chỉ / Nạp Whey', sp: 5 },
        { title: 'Combo Hoàn Thành Ngày', desc: 'Đạt đủ 3 quest cốt lõi bên trên', sp: 10 }
    ];

    let currentSP = parseInt(localStorage.getItem('survival_v5_sp')) || 20;
    let systemLogs = JSON.parse(localStorage.getItem('survival_v5_logs')) || [];
    let customQuests = JSON.parse(localStorage.getItem('survival_v5_custom_quests')) || initialQuests;
    let shopItems = JSON.parse(localStorage.getItem('survival_v5_shop_items')) || initialShopItems;
    let inventory = JSON.parse(localStorage.getItem('survival_v5_inventory')) || [];

    setInterval(updateTimers, 200);

    function updateUI() {
        document.getElementById('sp-counter').textContent = currentSP;
        localStorage.setItem('survival_v5_sp', currentSP);
        document.getElementById('sp-counter').style.color = currentSP < 0 ? 'var(--danger-color)' : 'var(--secondary-color)';

        renderQuests();
        renderShop();
        renderInventory();
        renderLogs();
    }

    function safeCreateItemElement(typeClass, titleText, descText, costText, isPlus, actionBtn, deleteFn) {
        const item = document.createElement('div');
        item.className = `item ${typeClass}`;
        const info = document.createElement('div');
        info.className = 'item-info';
        const titleRow = document.createElement('div');
        titleRow.className = 'item-title-row';
        const title = document.createElement('span');
        title.className = 'item-title';
        title.textContent = titleText;
        titleRow.appendChild(title);

        if (deleteFn) {
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.textContent = '❌';
            delBtn.onclick = deleteFn;
            titleRow.appendChild(delBtn);
        }

        const desc = document.createElement('div');
        desc.className = 'item-desc';
        desc.textContent = descText;
        info.appendChild(titleRow);
        info.appendChild(desc);

        const cost = document.createElement('div');
        cost.className = `item-cost ${isPlus ? 'cost-plus' : 'cost-minus'}`;
        cost.textContent = costText;

        item.appendChild(info);
        item.appendChild(cost);
        item.appendChild(actionBtn);
        return item;
    }

    function renderQuests() {
        const container = document.getElementById('quests-container');
        container.innerHTML = '';
        customQuests.forEach((quest, index) => {
            const btn = document.createElement('button');
            btn.className = 'action-btn quest-btn';
            btn.textContent = 'Xong';
            btn.onclick = () => { currentSP += quest.sp; addLog(`+${quest.sp} SP: Hoàn thành '${quest.title}'`); };
            
            const el = safeCreateItemElement('quest', quest.title, quest.desc, `+${quest.sp} SP`, true, btn, (e) => {
                e.stopPropagation(); if(confirm("Xóa việc này?")) { customQuests.splice(index, 1); localStorage.setItem('survival_v5_custom_quests', JSON.stringify(customQuests)); updateUI(); }
            });
            container.appendChild(el);
        });
    }

    function renderShop() {
        const container = document.getElementById('shop-container');
        container.innerHTML = '';
        shopItems.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'action-btn shop-btn';
            btn.textContent = 'Đổi';
            btn.onclick = () => buyVoucher(index);

            let badge = item.duration > 0 ? `⏱️ ${item.duration/3600}h` : `📦 Dùng ngay`;
            const el = safeCreateItemElement('shop', item.title, `Loại: ${badge}`, `-${item.cost} SP`, false, btn, (e) => {
                e.stopPropagation(); if(confirm("Xóa món này?")) { shopItems.splice(index, 1); localStorage.setItem('survival_v5_shop_items', JSON.stringify(shopItems)); updateUI(); }
            });
            container.appendChild(el);
        });
    }

    function renderInventory() {
        const container = document.getElementById('inventory-container');
        container.innerHTML = '';
        if (inventory.length === 0) {
            container.innerHTML = `<div style="text-align: center; color: #8b949e; padding: 5px;">Kho trống. Đang sinh tồn mức cơ bản.</div>`;
            return;
        }

        inventory.forEach((item, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = `item ${item.isRunning ? 'active-voucher' : ''}`;

            const info = document.createElement('div');
            info.className = 'item-info';
            const title = document.createElement('span');
            title.className = 'item-title';
            title.textContent = item.title;
            if (item.duration > 0 && item.timeLeft <= 0) title.style.textDecoration = 'line-through';
            
            const desc = document.createElement('div');
            desc.className = 'item-desc';
            desc.textContent = item.isRunning ? 'Đang chạy' : 'Đang treo';
            info.appendChild(title); info.appendChild(desc);
            wrapper.appendChild(info);

            const rightSide = document.createElement('div');
            rightSide.style.display = 'flex'; rightSide.style.alignItems = 'center';

            if (item.duration > 0) {
                const timerSpan = document.createElement('span');
                timerSpan.className = 'timer-display';
                let totalSecs = Math.ceil(item.timeLeft);
                let hrs = Math.floor(totalSecs / 3600);
                let mins = Math.floor((totalSecs % 3600) / 60);
                let secs = totalSecs % 60;
                timerSpan.textContent = `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                rightSide.appendChild(timerSpan);

                const ctrlBtn = document.createElement('button');
                ctrlBtn.className = `ctrl-btn ${item.isRunning ? 'pause-btn' : 'play-btn'}`;
                ctrlBtn.textContent = item.isRunning ? '⏸ Pause' : '▶ Play';
                ctrlBtn.onclick = () => toggleVoucher(index);
                rightSide.appendChild(ctrlBtn);
            } else {
                const badge = document.createElement('span');
                badge.style.color = 'var(--warning-color)'; badge.style.marginRight = '5px';
                badge.textContent = '[Instant]';
                rightSide.appendChild(badge);

                const useBtn = document.createElement('button');
                useBtn.className = 'ctrl-btn'; useBtn.style.backgroundColor = '#30363d'; useBtn.style.color = 'white';
                useBtn.textContent = '✔️ Dùng';
                useBtn.onclick = () => { if(confirm(`Xác nhận sử dụng đặc quyền: ${item.title}?`)) { addLog(`✔️ Đã dùng: ${item.title}`); inventory.splice(index,1); localStorage.setItem('survival_v5_inventory', JSON.stringify(inventory)); updateUI(); } };
                rightSide.appendChild(useBtn);
            }
            wrapper.appendChild(rightSide);
            container.appendChild(wrapper);
        });
    }

    function renderLogs() {
        const container = document.getElementById('log-container'); container.innerHTML = '';
        systemLogs.slice().reverse().forEach(log => {
            const entry = document.createElement('div'); entry.className = 'log-entry';
            entry.innerHTML = `<span style="color: #8b949e;">[${log.time}]</span> ${log.text}`;
            container.appendChild(entry);
        });
        localStorage.setItem('survival_v5_logs', JSON.stringify(systemLogs));
    }

    function addLog(text) {
        const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        systemLogs.push({ time: timeStr, text: text });
        if (systemLogs.length > 15) systemLogs.shift();
        updateUI();
    }

    function addNewQuest() {
        const title = document.getElementById('new-quest-title'); const sp = document.getElementById('new-quest-sp');
        if (!title.value || !sp.value) return;
        customQuests.push({ title: title.value, desc: 'Nhiệm vụ tự tạo', sp: parseInt(sp.value) });
        localStorage.setItem('survival_v5_custom_quests', JSON.stringify(customQuests));
        title.value = ''; sp.value = ''; updateUI();
    }

    function toggleDurationInput() {
        document.getElementById('new-shop-hours').style.display = (document.getElementById('new-shop-type').value === 'duration') ? 'inline-block' : 'none';
    }

    function addNewShopItem() {
        const title = document.getElementById('new-shop-title'); const cost = document.getElementById('new-shop-cost');
        const type = document.getElementById('new-shop-type'); const hours = document.getElementById('new-shop-hours');
        if (!title.value || !cost.value) return;
        let secs = type.value === 'duration' ? parseInt(hours.value || 1) * 3600 : 0;
        shopItems.push({ title: title.value, desc: secs > 0 ? `Timer ${hours.value}h` : 'Dùng ngay', cost: parseInt(cost.value), duration: secs });
        localStorage.setItem('survival_v5_shop_items', JSON.stringify(shopItems));
        title.value = ''; cost.value = ''; hours.value = ''; updateUI();
    }

    function buyVoucher(index) {
        const item = shopItems[index];
        if (currentSP < item.cost) return alert("❌ Bạn không đủ năng lượng sinh tồn (SP) để đổi món này!");
        currentSP -= item.cost;
        inventory.push({ title: item.title, duration: item.duration, timeLeft: item.duration, isRunning: false, endTime: null });
        localStorage.setItem('survival_v5_inventory', JSON.stringify(inventory));
        addLog(`<span style="color: var(--warning-color); font-weight:bold;">-${item.cost} SP</span>: Đổi đặc quyền '${item.title}'`);
    }

    // TIMESTAMP TIMERS REALTIME LOGIC
    function toggleVoucher(index) {
        const item = inventory[index];
        if (item.timeLeft <= 0) return;
        item.isRunning = !item.isRunning;
        if (item.isRunning) {
            item.endTime = Date.now() + (item.timeLeft * 1000);
            addLog(`▶️ Kích hoạt: ${item.title}`);
        } else {
            item.timeLeft = Math.max(0, (item.endTime - Date.now()) / 1000);
            item.endTime = null;
            addLog(`⏸ Treo máy: ${item.title}`);
        }
        localStorage.setItem('survival_v5_inventory', JSON.stringify(inventory));
        updateUI();
    }

    function updateTimers() {
        let changed = false;
        let now = Date.now();
        inventory.forEach((item, index) => {
            if (item.isRunning && item.endTime) {
                let remaining = (item.endTime - now) / 1000;
                if (remaining <= 0) {
                    item.timeLeft = 0; item.isRunning = false; item.endTime = null; changed = true;
                    addLog(`🚨 <span style="color: var(--danger-color); font-weight:bold;">HẾT HẠN</span>: '${item.title}' đã kết thúc!`);
                    alert(`🚨 Hết giờ đặc quyền: ${item.title}!`);
                } else {
                    item.timeLeft = remaining; changed = true;
                }
            }
        });
        if (changed) {
            localStorage.setItem('survival_v5_inventory', JSON.stringify(inventory));
            renderInventory();
        }
    }

    function applyTax() {
        if (confirm("Xác nhận đánh thuế sinh tồn đầu ngày -10 SP?")) { currentSP -= 10; addLog(`<span style="color: var(--danger-color);">-10 SP</span>: Đã đóng thuế ngày.`); }
    }

    updateUI();
</script>
</body>
</html>
