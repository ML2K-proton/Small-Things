<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life RPG: Level Up Your Reality</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --text-light: #ffffff;
            --gold-color: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 {
            color: var(--text-color);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--panel-color);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid var(--accent-color);
        }

        /* Character Stats */
        .profile {
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar {
            font-size: 50px;
            background: var(--accent-color);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
        }
        .level-bar {
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress {
            background: var(--text-color);
            height: 15px;
            width: 0%;
            transition: width 0.3s;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #252545;
        }
        .gold-count {
            color: var(--gold-color);
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Quests & Shop */
        .tab-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .item-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--text-color);
            transition: transform 0.2s;
        }
        .item-card:hover {
            transform: translateX(5px);
        }
        .item-info p {
            margin: 5px 0 0 0;
            font-size: 0.9em;
            color: #ccc;
        }
        button {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ff6b81;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* Custom Quest Form */
        .add-quest-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .add-quest-form input, .add-quest-form select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid var(--accent-color);
            background: #0f3460;
            color: white;
        }
        .add-quest-form input { flex: 2; }
    </style>
</head>
<body>

    <h1>Level Up Your Reality</h1>
    
    <div class="container">
        <div class="panel">
            <div class="profile">
                <div class="avatar">🧙‍♂️</div>
                <h2 id="char-title">Tân Thủ</h2>
                <div>Cấp độ: <span id="level">1</span></div>
                <div class="level-bar">
                    <div id="exp-bar" class="progress"></div>
                </div>
                <div style="font-size: 0.8em; margin-top: 5px;"><span id="exp">0</span> / 1000 EXP</div>
            </div>
            
            <h3>Tài Sản & Chỉ Số</h3>
            <div class="stat-row">
                <span>💰 Vàng:</span>
                <span id="gold" class="gold-count">0</span>
            </div>
            <div class="stat-row">
                <span>💪 STR (Thể chất):</span>
                <span id="stat-str">10</span>
            </div>
            <div class="stat-row">
                <span>🧠 INT (Trí tuệ):</span>
                <span id="stat-int">10</span>
            </div>
            <div class="stat-row">
                <span>🔥 CHA (Sức hút):</span>
                <span id="stat-cha">10</span>
            </div>
            <div class="stat-row">
                <span>🍀 LUK (Tâm hồn):</span>
                <span id="stat-luk">10</span>
            </div>
        </div>

        <div class="panel">
            <h2>Bảng Nhiệm Vụ</h2>
            <div id="quest-list" class="tab-content">
                </div>

            <h3 style="margin-top: 30px;">Tự Thêm Nhiệm Vụ Mới</h3>
            <div class="add-quest-form">
                <input type="text" id="new-quest-text" placeholder="Nhập tên nhiệm vụ...">
                <select id="new-quest-type">
                    <option value="STR">Thể chất (STR)</option>
                    <option value="INT">Trí tuệ (INT)</option>
                    <option value="CHA">Sức hút (CHA)</option>
                    <option value="LUK">Tâm hồn (LUK)</option>
                </select>
                <button onclick="addCustomQuest()">Thêm</button>
            </div>

            <hr style="border-color: var(--accent-color); margin: 30px 0;">

            <h2>Cửa Hàng Trang Bị</h2>
            <div id="shop-list" class="tab-content">
                </div>
        </div>
    </div>

    <script>
        // Dữ liệu Game ban đầu
        let gameState = {
            level: 1,
            exp: 0,
            gold: 0,
            str: 10,
            int: 10,
            cha: 10,
            luk: 10,
            quests: [
                { id: 1, text: "Thức dậy trước 6:30 AM", type: "LUK", exp: 10, gold: 5, done: false },
                { id: 2, text: "Uống đủ 2L nước hôm nay", type: "STR", exp: 5, gold: 2, done: false },
                { id: 3, text: "Đọc sách/Học kỹ năng mới 15 phút", type: "INT", exp: 10, gold: 5, done: false },
                { id: 4, text: "Dọn dẹp phòng ốc sạch sẽ", type: "CHA", exp: 50, gold: 20, done: false }
            ],
            shop: [
                { id: 101, text: "Ly Cà phê Premium", cost: 50, desc: "Buff tỉnh táo làm việc trong 3 giờ" },
                { id: 102, text: "1 Trận Game / 1 Tập Phim giải trí", cost: 100, desc: "Hồi phục năng lượng tinh thần" },
                { id: 103, text: "Mua Khóa Học Kỹ Năng Mới", cost: 500, desc: "Tăng mạnh tiến trình cày INT" },
                { id: 104, text: "Đôi Giày Thể Thao Mới", cost: 1000, desc: "Tăng 20% động lực chạy bộ (STR)" }
            ]
        };

        // Tải dữ liệu cũ nếu có
        if (localStorage.getItem('lifeRPGState')) {
            gameState = JSON.parse(localStorage.getItem('lifeRPGState'));
        }

        function saveGame() {
            localStorage.setItem('lifeRPGState', JSON.stringify(gameState));
        }

        function updateUI() {
            // Cập nhật chỉ số nhân vật
            document.getElementById('level').innerText = gameState.level;
            document.getElementById('exp').innerText = gameState.exp;
            document.getElementById('gold').innerText = gameState.gold;
            document.getElementById('stat-str').innerText = gameState.str;
            document.getElementById('stat-int').innerText = gameState.int;
            document.getElementById('stat-cha').innerText = gameState.cha;
            document.getElementById('stat-luk').innerText = gameState.luk;

            // Cập nhật Thanh EXP
            let percent = (gameState.exp / 1000) * 100;
            document.getElementById('exp-bar').style.width = percent + '%';

            // Cập nhật Danh hiệu theo cấp độ
            let title = "Tân Thủ";
            if (gameState.level >= 31) title = "Huyền Thoại 👑";
            else if (gameState.level >= 16) title = "Chiến Binh Tinh Nhuệ ⚔️";
            else if (gameState.level >= 6) title = "Nhà Thám Hiểm 🧭";
            document.getElementById('char-title').innerText = title;

            // Render Danh sách nhiệm vụ chưa hoàn thành
            let questListHTML = '';
            gameState.quests.forEach(quest => {
                if(!quest.done) {
                    questListHTML += `
                        <div class="item-card" style="border-left-color: ${getTypeColor(quest.type)}">
                            <div class="item-info">
                                <strong>${quest.text}</strong>
                                <p>Phần thưởng: +${quest.exp} EXP | +${quest.gold} Vàng [Hệ: ${quest.type}]</p>
                            </div>
                            <button onclick="completeQuest(${quest.id})">Hoàn thành</button>
                        </div>
                    `;
                }
            });
            if(questListHTML === '') questListHTML = '<p style="text-align:center; color:#888;">Đã hết nhiệm vụ! Hãy tự thêm thử thách mới bên dưới.</p>';
            document.getElementById('quest-list').innerHTML = questListHTML;

            // Render Shop công tâm theo số vàng hiện tại
            let shopListHTML = '';
            gameState.shop.forEach(item => {
                let canBuy = gameState.gold >= item.cost;
                shopListHTML += `
                    <div class="item-card" style="border-left-color: #ffd700">
                        <div class="item-info">
                            <strong>${item.text}</strong>
                            <p>${item.desc}</p>
                            <span style="color: #ffd700; font-weight:bold;">💰 ${item.cost} Vàng</span>
                        </div>
                        <button ${canBuy ? '' : 'disabled'} style="background-color: #0f3460" onclick="buyItem(${item.id})">Mua</button>
                    </div>
                `;
            });
            document.getElementById('shop-list').innerHTML = shopListHTML;
        }

        function getTypeColor(type) {
            switch(type) {
                case 'STR': return '#ff4757';
                case 'INT': return '#1e90ff';
                case 'CHA': return '#ffa502';
                case 'LUK': return '#2ed573';
                default: return '#e94560';
            }
        }

        // Xử lý hoàn thành nhiệm vụ
        function completeQuest(id) {
            let questIndex = gameState.quests.findIndex(q => q.id === id);
            if (questIndex !== -1) {
                let quest = gameState.quests[questIndex];
                
                // Cộng thưởng
                gameState.exp += quest.exp;
                gameState.gold += quest.gold;

                // Cộng thuộc tính ngẫu nhiên hoặc theo hệ
                if (quest.type === 'STR') gameState.str += 1;
                if (quest.type === 'INT') gameState.int += 1;
                if (quest.type === 'CHA') gameState.cha += 1;
                if (quest.type === 'LUK') gameState.luk += 1;

                // Xóa nhiệm vụ cũ (hoặc reset trạng thái đối với Daily)
                gameState.quests.splice(questIndex, 1);

                // Kiểm tra Lên cấp
                if (gameState.exp >= 1000) {
                    gameState.level += 1;
                    gameState.exp -= 1000;
                    alert(`🎉 CHÚC MỪNG! Bạn đã thăng lên Cấp ${gameState.level}!`);
                }

                saveGame();
                updateUI();
            }
        }

        // Xử lý mua đồ trong shop
        function buyItem(id) {
            let item = gameState.shop.find(i => i.id === id);
            if (item && gameState.gold >= item.cost) {
                gameState.gold -= item.cost;
                alert(`🎁 Bạn đã đổi thành công vật phẩm: "${item.text}". Hãy tận hưởng phần thưởng ngoài đời thực nhé!`);
                saveGame();
                updateUI();
            }
        }

        // Tự thêm nhiệm vụ tùy chỉnh
        function addCustomQuest() {
            let text = document.getElementById('new-quest-text').value;
            let type = document.getElementById('new-quest-type').value;

            if (text.trim() === '') {
                alert('Vui lòng nhập nội dung nhiệm vụ!');
                return;
            }

            let newQuest = {
                id: Date.now(), // Tạo ID độc nhất ngẫu nhiên
                text: text,
                type: type,
                exp: 30, // Mặc định cho nhiệm vụ tự chọn
                gold: 15,
                done: false
            };

            gameState.quests.push(newQuest);
            document.getElementById('new-quest-text').value = ''; // Reset ô nhập
            saveGame();
            updateUI();
        }

        // Khởi chạy game lần đầu
        updateUI();
    </script>
</body>
</html>
